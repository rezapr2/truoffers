name: truoffers

# The VPS never builds — it pulls prebuilt images from GHCR.
# Build and publish them from a machine with real RAM: ./build-and-push.sh
# (or let .github/workflows/build-images.yml do it on push to main).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Deliberately no published ports: Mongo is only reachable from the
    # internal compose network, never from the public internet.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 5
      # After an unclean shutdown, WiredTiger replays its journal before
      # accepting connections. On a small VPS that can take several minutes, and
      # a short start_period marks Mongo unhealthy mid-recovery -- which aborts
      # the deploy, recreates the container, and corrupts the shutdown again on
      # the next attempt. A generous window costs nothing: a healthy check during
      # start_period passes immediately.
      start_period: 240s

  api:
    image: ${REGISTRY:-ghcr.io/rezapr2}/truoffers-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/truoffers
      JWT_SECRET: "${JWT_SECRET:?set JWT_SECRET in .env - generate one with 'openssl rand -hex 32'}"
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${SITE_URL:?set SITE_URL in .env}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  web:
    # NEXT_PUBLIC_* values are baked into this image at BUILD time, so the
    # public SITE_URL must be set when building, not here.
    image: ${REGISTRY:-ghcr.io/rezapr2}/truoffers-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-rendered pages call the API directly over the internal network
      INTERNAL_API_URL: http://api:4000/api
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?set SITE_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - api

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
