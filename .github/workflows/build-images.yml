name: Build and publish images

# Builds the production images on GitHub's runners (native amd64, free) and
# publishes them to GHCR. Deployment stays manual: SSH to the VPS and run
# ./deploy.sh to pull the new images. No SSH keys are stored in GitHub.
#
# Required repo settings (Settings -> Secrets and variables -> Actions -> Variables):
#   SITE_URL           e.g. https://truoffers.co.uk   (baked into the frontend)
#   GOOGLE_CLIENT_ID   optional
#   APPLE_CLIENT_ID    optional

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
          - name: web
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}/truoffers-${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          # NEXT_PUBLIC_* are compiled into the browser bundle, so the public URL
          # must be supplied at build time. Ignored by the api image.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.SITE_URL }}/api
            NEXT_PUBLIC_SITE_URL=${{ vars.SITE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            NEXT_PUBLIC_APPLE_CLIENT_ID=${{ vars.APPLE_CLIENT_ID }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
